# =============================================================================
# server-config-drift-detector — Linux Snapshot Configuration
# =============================================================================
#
# PURPOSE:
#   Operator-controlled configuration for take-snapshot.sh, compare-snapshots.sh,
#   and drift-report.sh. This file is sourced by all three scripts using:
#       source "$CONFIG_PATH"
#
#   Edit values below to suit your environment. Do not remove variable
#   assignments — set boolean values to "false" instead of deleting the line,
#   or scripts that reference an unset variable will fail with an error
#   rather than silently behaving incorrectly.
#
# FORMAT:
#   Standard shell KEY=VALUE syntax. Values containing spaces must be quoted.
#   Boolean values must be the literal strings "true" or "false".
#   Arrays use Bash array syntax: VAR=("item1" "item2" "item3")
#
# =============================================================================

SCHEMA_VERSION="1.0"

# -----------------------------------------------------------------------------
# OUTPUT DIRECTORIES
# Paths may be absolute or relative to the repository root. These directories
# are excluded from version control by .gitignore.
# -----------------------------------------------------------------------------

SNAPSHOT_DIR="snapshots"
DIFF_DIR="diff"
REPORT_DIR="reports"
LOG_DIR="logs"

# -----------------------------------------------------------------------------
# RETENTION POLICY
# Number of comparison snapshots to retain before the oldest is automatically
# removed. Baseline snapshots (label = "baseline") are exempt from retention
# and are never automatically removed.
# -----------------------------------------------------------------------------

MAX_COMPARISON_SNAPSHOTS=30
MAX_DIFF_FILES=30
MAX_REPORT_FILES=30

# -----------------------------------------------------------------------------
# CAPTURE CATEGORIES
# Set any value to "false" to exclude that category from snapshot capture.
# Excluding a category removes it from both snapshot output and drift
# comparison.
# -----------------------------------------------------------------------------

CAPTURE_INSTALLED_PACKAGES=true
CAPTURE_SERVICES=true
CAPTURE_LOCAL_USERS=true
CAPTURE_SUDO_ACCESS=true
CAPTURE_FIREWALL_RULES=true
CAPTURE_LISTENING_PORTS=true
CAPTURE_CRON_JOBS=true
CAPTURE_SELINUX_STATUS=true
CAPTURE_CONFIG_CHECKSUMS=true

# -----------------------------------------------------------------------------
# CONFIGURATION FILE CHECKSUM TARGETS
# Files whose SHA-256 checksum is captured and compared. See
# docs/snapshot-methodology.md for the rationale behind this specific list.
# Add additional application-specific files here if required for your
# environment.
# -----------------------------------------------------------------------------

CHECKSUM_TARGET_FILES=(
  "/etc/ssh/sshd_config"
  "/etc/sudoers"
  "/etc/passwd"
  "/etc/shadow"
  "/etc/group"
  "/etc/hosts"
  "/etc/resolv.conf"
  "/etc/chrony.conf"
  "/etc/login.defs"
  "/etc/pam.d/sshd"
  "/etc/pam.d/sudo"
)

# -----------------------------------------------------------------------------
# SEVERITY THRESHOLDS
# Severity classification applied by drift-report.sh. Valid values:
# INFORMATIONAL, NOTABLE, CRITICAL
# Format: CATEGORY_ADDED, CATEGORY_REMOVED, CATEGORY_MODIFIED
# -----------------------------------------------------------------------------

SEVERITY_PACKAGES_ADDED="INFORMATIONAL"
SEVERITY_PACKAGES_REMOVED="NOTABLE"
SEVERITY_PACKAGES_MODIFIED="INFORMATIONAL"

SEVERITY_SERVICES_ADDED="NOTABLE"
SEVERITY_SERVICES_REMOVED="CRITICAL"
SEVERITY_SERVICES_MODIFIED="NOTABLE"

SEVERITY_USERS_ADDED="CRITICAL"
SEVERITY_USERS_REMOVED="CRITICAL"
SEVERITY_USERS_MODIFIED="CRITICAL"

SEVERITY_SUDO_ADDED="CRITICAL"
SEVERITY_SUDO_REMOVED="NOTABLE"
SEVERITY_SUDO_MODIFIED="CRITICAL"

SEVERITY_FIREWALL_ADDED="NOTABLE"
SEVERITY_FIREWALL_REMOVED="CRITICAL"
SEVERITY_FIREWALL_MODIFIED="CRITICAL"

SEVERITY_PORTS_ADDED="NOTABLE"
SEVERITY_PORTS_REMOVED="INFORMATIONAL"
SEVERITY_PORTS_MODIFIED="NOTABLE"

SEVERITY_CRON_ADDED="CRITICAL"
SEVERITY_CRON_REMOVED="NOTABLE"
SEVERITY_CRON_MODIFIED="CRITICAL"

SEVERITY_SELINUX_MODIFIED="CRITICAL"

SEVERITY_CHECKSUM_CHANGED="CRITICAL"

# -----------------------------------------------------------------------------
# PRIVILEGED GROUP ESCALATION
# Group memberships treated as privileged for severity escalation purposes.
# A user account being added to any of these groups is always classified
# CRITICAL regardless of the SEVERITY_USERS_MODIFIED setting above.
# -----------------------------------------------------------------------------

PRIVILEGED_GROUPS=("wheel" "root" "sudo")

# -----------------------------------------------------------------------------
# REPORT OPTIONS
# Controls output format of drift-report.sh.
# -----------------------------------------------------------------------------

GENERATE_MARKDOWN_REPORT=true
GENERATE_JSON_REPORT=true
INCLUDE_UNCHANGED_CATEGORIES_IN_SUMMARY=true
INCLUDE_INFORMATIONAL_CHANGES_IN_DETAIL=true

# -----------------------------------------------------------------------------
# LOGGING
# Controls script execution logging. Logs record script start/end, errors,
# and category-level capture success/failure. Logs do not contain captured
# data itself.
# -----------------------------------------------------------------------------

LOGGING_ENABLED=true
LOG_LEVEL="INFO"
LOG_RETENTION_DAYS=30

# -----------------------------------------------------------------------------
# DEPENDENCY VALIDATION
# Path to the Python 3 interpreter used by compare-snapshots.sh for JSON
# parsing. Most RHEL 9 installations have python3 on PATH by default; this
# override exists for environments where it is installed at a non-standard
# location or under a different binary name.
# -----------------------------------------------------------------------------

PYTHON3_BINARY="python3"

SCRIPT_VERSION="1.0.0"